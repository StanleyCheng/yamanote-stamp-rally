const map = L.map('map', {
  center: [35.68, 139.74],
  zoom: 12,
  zoomControl: true,
  attributionControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19
}).addTo(map);

// Glow layer
L.polyline(routeCoords, { color: '#0072C6', weight: 9, opacity: 0.12, interactive: false }).addTo(map);

// Main route
const mainRoute = L.polyline(routeCoords, {
  color: '#4A9FE5', weight: 3.5, opacity: 0.85
}).addTo(map);

// Station markers
const markers = [];
stations.forEach((s, i) => {
  const needsSpur = s.dist > 30;
  const radius = s.dist <= 30 ? 8 : (s.dist <= 80 ? 7 : 6);
  const fillC = s.dist <= 30 ? '#FF3D57' : (s.dist <= 80 ? '#FF6B35' : '#FFD700');
  
  const marker = L.circleMarker([s.lat, s.lng], {
    radius, fillColor: fillC, color: '#FFFFFF', weight: 2, fillOpacity: 0.9
  }).addTo(map);
  
  const spurTag = s.dist <= 30 ? '✅ Natural pass' : `⚠️ Spur ${s.dist}m`;
  marker.bindTooltip(
    `<b style="color:#4A9FE5">${s.code}</b> ${s.name}<br>` +
    `<span style="font-size:10px;color:#${needsSpur?'FF6B35':'00C853'}">${spurTag}</span>`,
    { direction: 'top', offset: [0, -5] }
  );
  marker.on('click', () => { map.setView([s.lat, s.lng], 16); highlightStation(i); });
  markers.push(marker);
  
  // Draw spur line for stations needing spurs
  if (needsSpur) {
    let minD = Infinity, nlat = null, nlng = null;
    for (const r of routeCoords) {
      const d = Math.hypot(r[0]-s.lat, r[1]-s.lng);
      if (d < minD) { minD = d; nlat = r[0]; nlng = r[1]; }
    }
    if (nlat !== null) {
      L.polyline([[nlat, nlng], [s.lat, s.lng]], {
        color: '#00C853', weight: 1.5, opacity: 0.3, dashArray: '4,6'
      }).addTo(map);
    }
  }
});

// Station chips
const tabContainer = document.getElementById('stationTabs');
stations.forEach((s, i) => {
  const chip = document.createElement('div');
  chip.className = 'station-chip';
  let bc = s.dist <= 30 ? '' : (s.dist <= 80 ? 'far' : 'farthest');
  const label = s.dist <= 30 ? `${s.dist}m` : `⚡${s.dist}m`;
  chip.innerHTML = `<span class="code">${s.code}</span><span class="name">${s.name}</span><span class="dist-badge ${bc}">${label}</span>`;
  chip.addEventListener('click', () => { map.setView([s.lat, s.lng], 16); markers[i].openTooltip(); highlightStation(i); });
  tabContainer.appendChild(chip);
});

function highlightStation(idx) {
  document.querySelectorAll('.station-chip').forEach((c, i) => c.classList.toggle('active', i === idx));
}

map.fitBounds(mainRoute.getBounds().pad(0.05));
</script>
