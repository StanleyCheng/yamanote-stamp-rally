<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>山手線 Stamp Rally — Garmin Edition v2</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0A0F1E;
  color: #E0E8F0;
  overflow: hidden;
  height: 100vh;
}
#map {
  position: fixed;
  top: 0; left: 0; right: 0;
  bottom: 210px;
  z-index: 1;
}

/* Garmin-style header bar */
.header-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: linear-gradient(180deg, rgba(10,15,30,0.98) 0%, rgba(10,15,30,0.85) 70%, transparent 100%);
  padding: 14px 18px 22px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.header-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, #0072C6, #4A9FE5);
  border-radius: 10px;
  display: flex;
  align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  box-shadow: 0 0 24px rgba(0,114,198,0.3);
}
.header-title { flex: 1; }
.header-title h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; color: #F0F4FA; }
.header-title p { font-size: 11px; color: #6B7F9F; margin-top: 1px; }
.header-badge {
  background: rgba(0,204,83,0.12);
  color: #00C853; padding: 3px 10px;
  border-radius: 20px; font-size: 10px; font-weight: 600;
  border: 1px solid rgba(0,204,83,0.2);
}

/* Dashboard */
.dashboard {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 1000;
  background: #0E1628;
  border-top: 1px solid rgba(0,114,198,0.12);
  max-height: 210px;
  display: flex;
  flex-direction: column;
}

/* Stats row — Garmin Connect style */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr) 1.2fr;
  gap: 0;
  padding: 14px 8px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.stat-cell { text-align: center; position: relative; }
.stat-cell:not(:last-child)::after {
  content: ''; position: absolute; right: 0; top: 15%;
  height: 70%; width: 1px;
  background: rgba(255,255,255,0.04);
}
.stat-value { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
.stat-value.blue { color: #4A9FE5; }
.stat-value.green { color: #00C853; }
.stat-value.gold { color: #FFD700; }
.stat-value.purple { color: #9C7CFF; }
.stat-label { font-size: 8px; color: #5A6F8F; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-top: 3px; }
.stat-sub { font-size: 8px; color: rgba(255,255,255,0.15); }

/* Station tabs — chip style like Garmin Connect activity list */
.station-tabs {
  display: flex;
  overflow-x: auto;
  overflow-y: hidden;
  gap: 5px;
  padding: 8px 14px;
  flex: 1;
  min-height: 0;
}
.station-tabs::-webkit-scrollbar { height: 2px; }
.station-tabs::-webkit-scrollbar-thumb { background: rgba(0,114,198,0.25); border-radius: 2px; }

.station-chip {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #172236;
  border: 1px solid rgba(0,114,198,0.1);
  border-radius: 22px;
  padding: 5px 12px 5px 10px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}
.station-chip:hover {
  background: rgba(0,114,198,0.12);
  border-color: rgba(0,114,198,0.25);
  transform: translateY(-1px);
}
.station-chip.active {
  background: rgba(0,114,198,0.15);
  border-color: #0072C6;
  box-shadow: 0 0 14px rgba(0,114,198,0.12);
}
.station-chip .code { font-weight: 700; color: #4A9FE5; font-size: 9px; }
.station-chip .name { color: #C8D4E8; font-weight: 500; }
.station-chip .dist-badge {
  background: rgba(0,204,83,0.1);
  color: #00C853;
  padding: 1px 6px;
  border-radius: 10px;
  font-size: 8px;
  font-weight: 600;
}
.station-chip .dist-badge.far {
  background: rgba(255,107,53,0.1);
  color: #FF6B35;
}
.station-chip .dist-badge.farthest {
  background: rgba(255,61,87,0.1);
  color: #FF3D57;
}

/* Legend */
.legend {
  position: fixed;
  bottom: 218px;
  right: 14px;
  z-index: 999;
  background: rgba(10,15,30,0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(0,114,198,0.12);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 10px;
  line-height: 1.9;
}
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-line { width: 22px; height: 3px; border-radius: 2px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.legend-dash { width: 18px; height: 2px; border-radius: 1px; }

/* Leaflet overrides */
.leaflet-container { background: #080C18 !important; }
.leaflet-control-zoom a {
  background: #172236 !important;
  color: #C8D4E8 !important;
  border-color: rgba(0,114,198,0.15) !important;
}
.leaflet-control-zoom a:hover { background: rgba(0,114,198,0.2) !important; }
.leaflet-popup-content-wrapper {
  background: #0E1628 !important;
  color: #E0E8F0 !important;
  border-radius: 12px !important;
  border: 1px solid rgba(0,114,198,0.15) !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
}
.leaflet-popup-tip { background: #0E1628 !important; border-color: rgba(0,114,198,0.15) !important; }
.leaflet-popup-close-button { color: #5A6F8F !important; }
.leaflet-tooltip {
  background: #0E1628 !important;
  color: #E0E8F0 !important;
  border: 1px solid rgba(0,114,198,0.15) !important;
  border-radius: 8px !important;
  padding: 6px 10px !important;
  font-size: 11px !important;
  font-family: 'Inter', sans-serif !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
}
.leaflet-tooltip-top:before { border-top-color: rgba(0,114,198,0.15) !important; }
</style>

const map = L.map('map', {
  center: [35.68, 139.74],
  zoom: 12,
  zoomControl: true,
  attributionControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19
}).addTo(map);

// Glow layer
L.polyline(routeCoords, {
  color: '#0072C6', weight: 9, opacity: 0.12, interactive: false
}).addTo(map);

// Main route
const mainRoute = L.polyline(routeCoords, {
  color: '#4A9FE5', weight: 3.5, opacity: 0.85
}).addTo(map);

// Station markers + spur lines
const markers = [];
stations.forEach((s, i) => {
  const radius = s.dist <= 30 ? 8 : (s.dist <= 80 ? 7 : 6);
  const color = s.dist <= 30 ? '#FF3D57' : (s.dist <= 80 ? '#FF6B35' : '#FFD700');
  
  const marker = L.circleMarker([s.lat, s.lng], {
    radius, fillColor: color, color: '#FFFFFF', weight: 2, fillOpacity: 0.9
  }).addTo(map);
  
  marker.bindTooltip(
    `<b style="color:#4A9FE5">${s.code}</b> ${s.name}<br>` +
    `<span style="font-size:10px;color:#5A6F8F">${s.dist}m from route</span>`,
    { direction: 'top', offset: [0, -5] }
  );
  marker.on('click', () => { map.setView([s.lat, s.lng], 16); highlightStation(i); });
  markers.push(marker);
  
  // Spur line
  let minD = Infinity, nlat = null, nlng = null;
  for (const r of routeCoords) {
    const d = Math.hypot(r[0]-s.lat, r[1]-s.lng);
    if (d < minD) { minD = d; nlat = r[0]; nlng = r[1]; }
  }
  if (nlat !== null) {
    L.polyline([[nlat, nlng], [s.lat, s.lng]], {
      color: '#00C853', weight: 1.5, opacity: 0.3, dashArray: '4,6'
    }).addTo(map);
  }
});

// Station chips
const tabContainer = document.getElementById('stationTabs');
stations.forEach((s, i) => {
  const chip = document.createElement('div');
  chip.className = 'station-chip';
  
  let badgeClass = '';
  if (s.dist <= 50) badgeClass = '';
  else if (s.dist <= 100) badgeClass = 'far';
  else badgeClass = 'farthest';
  
  chip.innerHTML = `
    <span class="code">${s.code}</span>
    <span class="name">${s.name}</span>
    <span class="dist-badge ${badgeClass}">${s.dist}m</span>`;
  
  chip.addEventListener('click', () => {
    map.setView([s.lat, s.lng], 16);
    markers[i].openTooltip();
    highlightStation(i);
  });
  tabContainer.appendChild(chip);
});

function highlightStation(idx) {
  document.querySelectorAll('.station-chip').forEach((c, i) => c.classList.toggle('active', i === idx));
}

map.fitBounds(mainRoute.getBounds().pad(0.05));
</script>
